name: 🚀 Deploy Affiliate Empire

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'apps/api/**'
      - 'apps/dashboard/**'
      - 'scripts/**'
  workflow_dispatch:

env:
  BUN_VERSION: latest

jobs:
  # Test & Build
  test:
    name: 🧪 Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: ${{ env.BUN_VERSION }}
      
      - name: Install Dependencies
        run: bun install
      
      - name: Type Check
        run: bun run type-check
      
      - name: Run Tests
        run: bun test
  
  # Deploy API (Cloudflare Workers)
  deploy-api:
    name: ⚡ Deploy API
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: ${{ env.BUN_VERSION }}
      
      - name: Install Dependencies
        run: bun install
      
      - name: Deploy to Cloudflare Workers
        working-directory: apps/api
        run: bunx wrangler deploy -e production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  
  # Deploy Dashboard (Cloudflare Pages)
  deploy-dashboard:
    name: 🎨 Deploy Dashboard
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: ${{ env.BUN_VERSION }}
      
      - name: Install Dependencies
        run: bun install
      
      - name: Build Dashboard
        run: bun run build:ui
      
      - name: Deploy to Cloudflare Pages
        working-directory: apps/dashboard
        run: bunx wrangler pages deploy dist --project-name=telegram-affiliate-dashboard --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  
  # Configure Telegram Webhook
  configure-webhook:
    name: 🔗 Configure Telegram Webhook
    runs-on: ubuntu-latest
    needs: deploy-api
    steps:
      - name: Set Telegram Webhook
        run: |
          curl -X POST "https://api.telegram.org/bot${{ secrets.BOT_TOKEN }}/setWebhook" \
            -H "Content-Type: application/json" \
            -d "{\"url\": \"${{ secrets.API_URL }}/telegram/webhook\"}"
  
  # Notify Success
  notify:
    name: 📢 Notify Success
    runs-on: ubuntu-latest
    needs: [deploy-api, deploy-dashboard, configure-webhook]
    if: success()
    steps:
      - name: Send Telegram Notification
        run: |
          curl -X POST "https://api.telegram.org/bot${{ secrets.BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{
              \"chat_id\": \"${{ secrets.ADMIN_CHAT_ID }}\",
              \"text\": \"🚀 *Affiliate Empire Deployed!*\\n\\n✅ API\\n✅ Dashboard\\n✅ Webhook\\n\\nTime: $(date)\",
              \"parse_mode\": \"Markdown\"
            }"

