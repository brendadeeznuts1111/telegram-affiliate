name: Quality Gates

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-check:
    name: Quality Check (${{ matrix.component }})
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      matrix:
        component: [api, dashboard]
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.bun
            node_modules
            apps/*/node_modules
            packages/*/node_modules
            .turbo
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb') }}-${{ matrix.component }}
          restore-keys: |
            ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb') }}-
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: |
          if [ "${{ matrix.component }}" = "api" ]; then
            cd apps/api && bunx tsc --noEmit
          else
            cd apps/dashboard && bunx vue-tsc --noEmit
          fi

      - name: Lint
        run: bun --filter=${{ matrix.component }} run lint || bunx prettier --check apps/${{ matrix.component }}

      - name: Test
        run: bun --filter=${{ matrix.component }} test || echo "No tests configured yet"

      - name: Build
        run: bun --filter=${{ matrix.component }} run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: ${{ matrix.component }}-build
          path: apps/${{ matrix.component }}/dist
          retention-days: 1

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: quality-check

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Download build artifacts
        uses: actions/download-artifact@v3
        with:
          name: dashboard-build
          path: apps/dashboard/dist

      - name: Run E2E tests
        run: bunx playwright test --project=chromium
        continue-on-error: true

      - name: Upload test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Comment PR with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const comment = `## 🎭 E2E Test Results

            Tests have been executed. Check the workflow for detailed results.

            [View full report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

      - name: Security audit
        run: bun audit --audit-level=moderate || true
        continue-on-error: true

  status-check:
    name: Quality Gate Status
    runs-on: ubuntu-latest
    needs: [quality-check, e2e-tests, security-scan]
    if: always()

    steps:
      - name: Check overall status
        run: |
          if [ "${{ needs.quality-check.result }}" != "success" ] || \
             [ "${{ needs.e2e-tests.result }}" != "success" ] || \
             [ "${{ needs.security-scan.result }}" != "success" ]; then
            echo "❌ Quality gates failed"
            exit 1
          fi
          echo "✅ All quality gates passed!"
