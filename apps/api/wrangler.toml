name = "telegram-affiliate-api"
main = "src/index-worker.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
# no build step needed – Bun TS is transpiled by Wrangler

# Choose your Cloudflare account:
# account_id = "5e5d2b2fa037e9924a50619c08f9f442" # Brendawill2233@gmail.com
# account_id = "80693377f3abb78e00820aa69a415ce4" # Nolarose1968@gmail.com
account_id = "80693377f3abb78e00820aa69a415ce4" # Using Nolarose account (change if needed)

# Use Cloudflare D1 for database
[[d1_databases]]
binding = "DB"
database_name = "affiliate-system"
database_id = "e6cc2427-f81b-4849-bcba-acacb3aedc70"

# KV namespace for affiliate tracking
[[kv_namespaces]]
binding = "AFFILIATE_KV"
id = "c2b03d2d2c5a48869f818923388306d2"
preview_id = "d6c780ba8cde4775acbff2f903489042"

# Environment variables (non-secret)
[vars]
PUBLIC_URL = "https://telegram-affiliate-api.workers.dev"
TELEGRAM_BOT_USERNAME = "Firesupportcs_bot"

# Secrets (set with: bunx wrangler secret put <NAME> --env production)
# - BOT_TOKEN
# - ADMIN_IDS
# - WEBHOOK_SECRET
# - WITHDRAWAL_PRIVATE_KEY
# - TELEGRAM_BOT_TOKEN

[env.staging]
name = "telegram-affiliate-api-staging"
vars = { NODE_ENV = "staging" }

[[env.staging.d1_databases]]
binding = "DB"
database_name = "affiliate-system-staging"
database_id = "" # staging database

[env.production]
name = "telegram-affiliate-api"
vars = { NODE_ENV = "production", PUBLIC_URL = "https://telegram-affiliate-api.workers.dev", TELEGRAM_BOT_USERNAME = "Firesupportcs_bot" }

[[env.production.d1_databases]]
binding = "DB"
database_name = "affiliate-system"
database_id = "e6cc2427-f81b-4849-bcba-acacb3aedc70" # production database

[[env.production.kv_namespaces]]
binding = "AFFILIATE_KV"
id = "c2b03d2d2c5a48869f818923388306d2"

